default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test]
  - repo: local
    hooks:
      - id: commenting-standards
        name: commenting-standards
        entry: ./.venv/bin/python -m pytest tests/test_commenting_standards.py -q
        language: system
        pass_filenames: false
